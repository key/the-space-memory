name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - run: rumdl check .

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - run: yamllint .

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - run: shellcheck .devcontainer/*.sh scripts/*.sh

  testdata-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: bash scripts/lint-testdata-dates.sh

  toml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - run: taplo check

  mise-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
        id: mise
      - name: Check for mise warnings
        run: |
          output=$(mise install 2>&1 || true)
          if echo "$output" | grep -qi "WARN"; then
            echo "::error::mise produced warnings:"
            echo "$output" | grep -i "WARN"
            exit 1
          fi
